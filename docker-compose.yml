version: '3.8'

services:
  app:
    image: ghcr.io/ismola/jw-hitster:main
    container_name: jw-hitster-app
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    # networks:
    #   - jw-network

  nginx:
    image: ghcr.io/ismola/jw-hitster-nginx:main
    container_name: jw-hitster-nginx
    expose:
      - "80"
    depends_on:
      - app
    restart: unless-stopped
    # networks:
    #   - jw-network
    #   - cloudflare_default

# networks:
#   jw-network:
#     driver: bridge
#   cloudflare_default:
#     external: true
